body:
  text: 樵陽經女工修煉太陰煉形與男子修煉之法大同小異初功下手閉目存神大休息一場使心靜息調而後凝神入於氣穴在兩乳間心窩上將兩手交叉捧乳輕輕柔摩二十遍將氣自下丹田微微吸起三十六口仍用手捧乳返照調息久久自然真氣往來一開一合養成鄞鄂神氣充足真陽自旺其經水自絶乳如男子是謂斬赤龍如此久久行持後不必捧乳吸氣只凝神於氣穴回光返照是謂玄牝之門也真息悠悠虛極靜篤陽氣薰蒸河車運轉萬朵紫雲籠玉宇千條血脈貫泥丸自覺一點靈光不內不外自下田上升絳宮泥丸下重樓歸於金胎神室回光凝神真息住於中宮鼎內是神入室矣是為玄牝是為胎仙即一點落黃庭也其後十月功夫陽神出現粉碎虛空一路修真與男子同無彼此之別也女功煉己還丹圖說一聖師曰女子太陰先煉形初行功即要意棲乳房行住坐臥皆宜如是行至四十九日行住坐臥意守中極中極者即心之下血海之上當中虛懸一穴是也行住宜默運天庭坐臥宜意守中極血海如雞抱卵一念不起百想俱無但行此功真陰未動脈絡未通必多倦睡須行指腦下垂之功指腦下垂者何也即回光返照以眼觀鼻搭定雀橋下玄膺至重樓歸中極入血海以水會火片刻即醒此即調藥煉心之法如妄念一動仍守中極少年女子煉至百日不為外物所擾血海自潮真陰自動動者非身心動是血氣發潮似有不可忍之景象其樂也融融難以言語形容是由無念而自動此時切不可動念念動則散惟宜把定元神用法採取此即小藥發生須行採取之法兩三度以機息為止仍守中極採取之法以眼觀鼻過雀橋下玄膺到重樓入乳房遊中極歸血海行分水透玉枕升百會下泥丸入明堂仍降下中極而歸血海將真意守定中極血海入靜入定如其陰生再行採取之法機息仍守中極血海凡行此功須戒暴怒風寒暑濕以及生冷瓜果火煎之物此時定要檢點倘風寒入竅藥難醫治總要萬緣放下一塵不染如果照法行持一日之間真陰之氣能動二三次此動要分真僞有氣機之動有念慮之動須無念無慮無欲而自動方算真陰發動只要百零七日血盡化氣赤龍自斬變成乾體基已成矣還丹有何難哉注云女丹經多言女子行功每逢月信一到便要停功此說謬矣皆由未分清晰誤也凡女功所重者氣機也但其中有壬癸之分如壬水初來癸未來此即信到也信到彼自知之或頭昏或腰疼信至而潮猶未至此時正宜回光返照默守乳房血海用採取之法以補腦築基則所採者壬水非癸水也如癸水一到自應停功必至三十時辰兩日半癸盡之時仍用採取之法採至何日而止其中大有天機口訣須求真師口傳心授不可妄猜如果得其傳授少年百日便可基成行功到此自有考驗赤龍自斬乳頭自縮如男子一般而真陰之氣化為真陽矣此時須要道侶同時扶持候真景到時採小藥過關小藥過關之時亦有景象果到基成藥産丹田有火珠馳驟血海如湯煎鼻搐身震切勿驚懼此處亦有口訣要待師方免危險不然恐真火變成凡火一防焚身二防顛狂如有得真師傳授者藥既入鼎便要知煉藥之法法待真師口訣若不知煉法不能結丹得者必失此藥既名小藥自宜用小周天火候小周天火候亦有口訣進陽火退陰符而鍛鍊之符火有候亦有數煉至一月小周數足或藥之真僞丹之結否自有考驗如小丹果結每逢入室靜坐遍體火發如蒸籠之氣一般只宜默守中宮訥宮不語聽其變化霎時之間見一火球如豆大從明堂射出一丈多高如閃電一樣乃基成得藥之真境界也斯時雖有煉藥祕法總要一念不起五蘊皆空任它天翻地覆雷電震驚我只將元神穩坐中宮毫無畏懼如雞抱卵如龍護珠時當進火則進時當退符則退進火退符有候有數必煉至大靜大定氣足神完火珠不現小丹凝結而後已焉此係築基得藥結丹三層口訣後尤有四層天機不能一口道盡歷來仙師授受皆系如此果然功行至此人仙之果證矣以後用功與男子無異但女屬靜體後四層雖與男丹同其運用而其建功更速矣真師總批凡孀婦貞女烈婦能立定真正志節始終如一受魔不退至死不變貧富不移堅貞不二乃可授此三層妙法循序漸進暗有仙真護持一切內外妖魔不敢擾害終期大成至於有夫之婦人事未了切勿妄傳只宜勸伊養性寡欲孝姑敬夫待時而傳倘恂情輕授確有可據無一毫妄誕之語倘恍之論實是天機不可輕泄得其傳者俱系前緣慎之珍之二午是陰之根子乃陽之苗男子外陽而內陰女子外陰而內陽男子奪外陽而點內丹女子奪內陰而點外丹也女子行功第一要明採身中之陰補身中之陽陽者精與氣也陰者神與血也採於何時須知月信將潮之時與月信潮盡之候夫信者何如人出外未歸而信先至也信至潮未至之時急忙用功或盤膝大坐或觀音半坐俟身中神氣發功回光返照乳房穴及血海鼻息調勻將所動之神氣用真意即黃婆從血海升入曹溪一路直達囟門由上降下到乳房而仍歸於中極但此法不可妄用信來而潮未來之時可用在兩日之半潮儘可用若潮信未淨妄行採取必至殺身謹記此法少年血氣旺者心地靜者三月之久便可斬赤龍而復還童體面如桃花如果功到此時與醉漢相似昏昏默默晝夜光明不散行持一年基可築固而人仙之功程驗矣中年婦女修煉須用太陰煉形之法夫行此法者須除思去欲忘情絶慮方行此道算定某日某時月信至未至前二三日即宜靜養待至信到於靜室內調息端坐兩手放膝前用食指𢬻子午上如拳閉目存神調息內觀由乳房照血海候至真陰之氣發動乃行鍛鍊之功若此段工夫要分真假清濁如煉假陰濁氣必成疾病醫藥罔效果然真陰發動周身如綿醉漢相似此時血海中如魚吸水一般其樂景有不可以言語形容者斯為真陰發現之真境也此景一到即用真意引過夾脊上玉枕透泥丸過雀橋下重樓入乳房而仍歸於中極血海也倘若體衰氣弱二三月之久真陰毫無動機無可如何方用作為之功先將右乳揉轉十二次後揉左乳十二次摩臍腹三十六次口中咽津液三次咽畢仍照前回光返照虛極靜篤以守之如此每日子午二時行持不怠不上一月自有動機則可採煉至真陰盡化為陽氣乳頭縮而赤龍斬變成男體則真陰煉形之功畢矣詩曰面如桃花膚似雪到此赤龍永斷絶清靜法身本無塵功滿飛升朝玉闕三丹基既成而還丹可冀赤龍一斬陰血盡化陽氣在丹田血海之中不能久住必要過關方成法身此時身熱如火氣騰如珠方用還丹之功與男子之功無異也若還至丹田祖竅方用周天煉藥之功夫玄關一竅萬神萬氣之祖也內有先天之祖氣會合凝結宜呼吸綿綿一意守之不散二氣自然交合八脈自然流通仙胎自然結成再往向上之功三年練己已成大還而結聖胎仙胎結成十月火候煉足嬰兒自現或聞絃歌絲竹之聲或暗室生白未來之事他人之心毫無隔滯觸景便知到此可以造就身外之身任他諸般景界不可著他不可懼他我只一心守中面壁九年候陰盡陽純形神俱妙與道合真待詔飛升永為王母之眷屬脫卻塵世之輪回矣算來不過數年辛苦竟成億萬年之快樂斯世之婦女思之又何憚而不為哉四呂祖曰可笑世間學道人論天論地講修行天機妙訣都不曉三家藥物未分明不煉爐中真造化難免苦海墮沉淪我今傳你三教理說段修行妙訣功先講天文並地理天地三才要精通男子修行伏白虎女子修行斬赤龍天地周流分度數日月循還運化工五千四八歸黃道金木水火轉相逢女子原是太陰體須知太陰妙化工每日右旋十三度二日半後行一宮一月運行周天畢女子氣候亦相同要知金丹真口訣天人造化本相通會得其中真妙竅晦朔弦望仔細窮一月運周機先動兩日半後即下功若人識得天機妙何愁女功不玲瓏再有一段真金訣須共神仙仔細論七星寶劍西南掛雙林樹下運轉輪盤中寶珠顆顆現一支白牛透崑崙百尺竿頭忙撒手騎牛趕月伴老僧又撞金鐘無影寺六月滴水化成冰沒絃琴音奏三疊無孔笛吹出八音木母伴作木馬走金公又隨金烏行二人翻江並倒海看看要到高峰亭灑了一點真甘露忽然七孔放光明到此一步緊一步切莫擾亂並因循待他一點來歸壺二五凝結始圓明若問此歌何人作兩口傳來度女貞其中妙理悉包盡莫負我今苦叮嚀女丹要言精氣三華自不衰清空紫氣仰成規金丹九轉元君煉壽似黃安坐寶龜清空紫氣之文元君之所授也黃安坐龜人問幾時坐起答曰此龜畏日月之光三十年出頭一次我坐是龜見三出頭矣汝等不明老陽無生息吾有一譬如月之初三是蛾眉到五六日仍圓者也婦人修煉如男子一樣難得者是皎潔須知婦人之欲過於男子或到經水已過之後其心如蓮之初放乘天之雨露才結其實婦人若無男子是孤陰矣孤陰不生蓮花若不受雨露之恩縱得之沃土終歸無用天之雨露非為萬物發生計不虛此一舉乎雨露不受於萬物是獨陽不長矣夫道即物可證隨事可通淺淡云為皆具至理無如人不思而通之耳婦女可以按摩之法用之當早起靜坐一刻以右手向內按定心左一手在腹臍撫摩二十下隨手摩至腰一揉一拍左手按心右手撫摩右手按心左手撫摩兩手在腰一揉一拍後再用兩手擦熱面上一擦兩手摩至兩耳一按一彈彈後隨揉至兩肩一捻運動津液咽下腰一伸立起兩手一抄走數步再出外做事可也晚間亦如此做照服丸首烏二兩核桃二兩麥冬一兩熟地兩半補骨脂六分砂仁三分杜仲八分天冬一兩生薑三分上藥八味共研細末以豬脂豬脂豬油也吃葷者用豬脂吃素者用人乳或牛乳羊乳均可乳即酥也非葷也西北人所謂奶子茶者即此能令人壯精神潤顏色黑髮延年佛祖在雪山苦行時食之故至今佛門不忌若假酥油則多羊油矣不如用人乳為是半斤和為丸服一月精神強健黑髮延年非它藥可比每月逢寅午申亥日用水一碗稱藥三分早起向東吸生氣三口咽下向西方吸氣一口吞下之後任憑應酬事件
