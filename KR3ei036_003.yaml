body:
  text: 下卷口訣收心金丹道理最幽深逐節功夫著意尋若問入門初下手掃除妄念以收心金丹大道至聖至神至玄至妙有內有外有始有終其中細微節目須知之清方行得到若不著意行之則知內不知外終落空亡知始不知終僅成小果而其下手用功以收放心為首孟子曰學問之道無他求其放心而已倘此心日放於外如野馬山猿刻不寧息此心日與情私為緣真性即日為物欲所蔽秉夷既牿則夜氣不存欲望結成胎仙不亦難乎故入門先把萬緣放下一絲不掛一塵不染放心於無何有鄉中清清靜靜空空寂寂久久純熟其心自死心死則神話雖不得仙去仙不遠矣養性一顆牟尼似水晶何期塵垢蔽精英但能靜坐回光照依舊天心夜月明真性本自靈明但為氣稟物欲所拘蔽則有時而昏然本體之明未嘗息也如能勤加拂拭用力涵養依舊如天心之月明照萬國涵養之法每日靜坐先將萬緣放下回光返照如月到天心風來水面一樣情景悠悠揚揚活活潑潑似有似無勿忘勿助事至物來雖如如不動卻又了了常知不知則流於木石之弊返照時總要安舒自在不自在則未合法不可再照恐成氣鬱古云先時要放又要收自後熟來不放亦不收收放得宜久久調養忽見石火電光此真性初現景象也由此用功自有圓明時候但返照之功不可久用古人云未得大藥不可久照恐出陰神入於魔道故十二時中以一時返照余時則瀟瀟自在其功夫總要不可閒斷純熟之後自有天然慧光發現明照九州慧觸未來又要知而忘其所知忘到忘無可忘自臻化境養氣雖能念住特初禪息到沖和始見天養氣方兒無別巧同行同坐夜同眠佛云初禪念住心無生滅也二禪息住息無出入也息無出入則息住而氣得所養矣此息非口鼻呼吸之息蓋人生之初隨母呼吸之息以成胎及裂胞而出此息藏於祖竅穴中雖與口鼻之息相通常人之息由口鼻出入不能入祖竅以歸根真人則息息歸根故莊子謂衆人之息以喉真人之息以踵是也欲尋真人之息須調後天呼吸之息以尋之真息歸根於祖竅其氣即藏於祖竅故息調則氣和息住氣不散古仙所謂氣歸元海壽無窮者此也然息必調到沖和時候乃可採藥乃可養胎故云沖和始見天劉長生曰沖和結坎離又曰沖和養神氣何謂沖和伍子曰不偏不倚不疾不徐非有非無如何作用方能沖和伍子又曰夫妻並肩陰陽合一晝則同行不前不後夜則同住不逼不離如斯了悟是沖和三昧總之伍子之言不過喻心息相依朝夕不離之謂也鍾離曰人能心息長相依換盡形骸玉液流故心息相依調到沖和養氣之能事畢矣凝神神是夫兮息是妻休教異路隔雲泥兩相匹配歸根處便與同登步月梯神者火也息者風也煉丹全憑風以煽火火以煉精風火同用神息相依兩不相離猶如夫妻一般故必凝神於氣穴中神抱住氣意繫住息不即不離勿忘勿助方是真匹偶真交媾朱元育曰要覓先天真種子須從混沌立根基混沌即歸根覆命之處也海蟾祖曰先賢明露丹臺旨幾度靈鳥宿桂柯旌陽祖曰與君說破我家風太陽移在明月中無非喻義神入氣穴之旨也三豐祖曰大凡打坐須將神抱住氣意繫住息在丹田中宛轉悠揚聚而不散則內藏之氣與外來之氣交結于丹田日充月盛達乎四肢流乎百脈撞開夾脊雙關上泥丸入絳宮下重樓神氣相守息息相依河車之路通矣功夫到此築基之效已得一半觀此則知凝神之功無論剛人柔人皆不可少也三命女子原來命有三紫白黃光不似男少上衰中成在下關頭一路要深諳女命有三紫白黃是也光之黃者丹田生丹之處也白者胎元結胎之地也紫者血光生血之海也其在上者為陽穴在中者為黃房在下者為丹田當其少也天癸滿一斤之數丹田真元之氣足上升血元生血陽極變陰化濁經而流行於外故少而從上及其衰也天癸耗盡氣不能上升以生血而腰乾血涸則經無矣故衰則從中若欲修成乾體須從下田運上陽穴神火薰蒸使經變黃黃變白白化無形自隱矣故曰成則從下與男子不同不識此關頭則丹不成氣穴氣穴無它即乳房休將臍下妄猜量人如不識陰生處安使毒龍自伏藏氣穴即血元也即乳房也在中一寸三分非兩乳也男命在丹田故以下田為氣穴女命在乳房故以乳房為氣穴陽極變陰從氣穴化陰血而流行於外故斬赤龍須從陰生之處用功久久行持形自隱矣若以男子臍下一寸三分之氣穴指之則誤也知時每到花開對月時羝羊正欲觸藩籬勸君信至休遲誤莫待赤龍出水湄先天玄微曰女子未生之前父母媾精之際父精先至母血後行血裹精而成女形女子受生之時先得母之鉛氣一兩先生右腎牽一條絲於上而生雙睛牽一條絲於下而生金丹自茲以往十二日生癸水一銖一百八十日生癸水一兩自是而後十五日生癸水一銖一年生癸水一兩至十四歲生癸水十四兩於血海中同前胎內帶來一兩共成全一斤之數三百八十四銖合周天三百八十四度一年得三百八十四日易卦三百八十四爻天地之數陰極陽生癸盡鉛現二七而天癸降矣十四歲而天癸降後至二十六個月零七日半耗去癸水一兩至四十九歲耗之已盡女子二七經行一月一度運行不息與月之晦朔同度不差時節若差時刻病作矣故月月花開時時經行其所以行此經者陽變為陰也陽既變陰則不可運若亂行妄運殺人不少須在羝羊未觸藩之先信至時用功上藥靈鏡三命篇曰月信者非以經至為月信者也信之一字如人在外尚未回家而信先至焉信至之日彼自知之或腰腿疼痛頭目不安不思飲食此信至而成血也乃氣也當在兩日半之前專心行功若經行則赤龍陰精不可把持亂行妄運殺人不少須待其經後兩日半以白綾試之其色黃金乃經罷時也照前功運上以斬之凡此之言正示人當知時行功也斬龍陽欲化陰出玉溝火輪忙駕莫停留巽風吹上紅元府斬斷赤經永不流陽欲化陰是信至猶未經行之時急忙鼓動巽風駕起火輪從丹田運上紅元府以斬之太陰煉形法曰初下手時閉目存神大休息一場使心靜息調而後凝神入氣穴將兩手交叉捧乳輕輕柔摩三百六十遍將氣自下丹田微微吸起二十四口仍用手捧乳返照調息久久自然真息往來一開一合養成鄞鄂神氣充足真陽自旺其經水自絶乳縮如男子是謂斬赤龍如此久久行持後不必捧乳吸氣只凝神於氣穴回光返照是為玄牝之門也真息悠悠虛極靜篤陽氣薰蒸河車逆轉萬朵紫雲朝玉宇千條百脈種泥丸斬赤龍之功有如此效驗故女子修煉以斬赤龍為要也形隱殺人無過此妖精七七數周命遂傾煉到太陰形隱後安排紫府慶長生許祖云男子修成不漏精女子修成不漏經蓋女子之經為生人之始信返經成氣則乳縮如男子而經自不漏若男子則煉精化氣陰根縮如童子而精自不漏不漏而後命可延若不斬此妖精到七七四十九歲血枯經盡無生機矣生機絶則命傾上藥靈鏡三命篇曰女子以血為腎乃空竅焉過四十九歲腰乾血涸無生機矣養而久之又生血元似處子焉此又無中生有之妙也見而有之一斬即化而命生矣如何養之使復生血元亦不過收心養性養氣凝神而已不二元君曰本是無為始何期落後天一聲才出口三寸已司權況披塵勞擾那堪疾病纏子肥能益母休道不回旋別有補功未敢輕泄即孫不二所謂縛虎歸真穴牽龍斬益丹之謂也女子修到經不漏其後性命功夫與男子之功大同小異患無人以訣破其奧妙耳求丹煉形化氣築基功上品天仙事不同若問金丹端的處日來映月照鴻濛日來映月方能發光萬古能明此理丹道不遠煉己生龍活虎戰蓮房最怕心猿意馬狂煉己不到純熟候安能過海把帆揚呂祖步蟾宮詞曰煉庚甲要生龍虎須知龍虎不是身外之物方是生的行道時驅活虎以就生龍最怕心猿發狂意馬揚威不知訓伏安能過得海去取得經回故必煉己純熟使神全氣盛七情不動五賊不亂六根大定色相兩忘乃可入蓮房以求丹天仙正理曰煉己者所謂苦行其當行之事曰煉熟行其當行之事曰煉禁絶其不當為之事曰煉精進勵志而求必成曰煉割絶貪愛而不留余愛曰煉禁止舊習而全不染曰煉己者即我靜中之真性動中之真意為元神之別名也古云未煉還丹先煉性未修大藥且修心煉己之道也順逆順則生人逆則仙坤乾為泰是真詮臨爐莫訝丹難結倒挽羊車自見天不二元君曰著眼絪縕後留心順逆途無根樹曰順為凡逆為仙只在中間顛倒顛故泰之卦象坤居上而乾居下乃能天地交而萬物通不知倒挽羊車則群陰阻塞安能去濁陰以見天心故修仙不問男合女只要於中知順逆耳丹生恍惚渺冥情似癡融和正是藥生時丹田有信機緣至速整火功採玉芝此丹稟於父母藏於氣穴年少壯時卻有向外拱關變化之機取此變化之機逆入黃中故謂之丹但丹生之時有象可睹道德經曰恍恍惚惚其中有物渺渺冥冥其中有精泥丸曰精神冥合氣歸時骨肉融合都不知尹真人曰俄傾𤸜生毫竅肢體如綿心覺恍惚丹生景象也且有信可聞邵子曰忽然夜半一聲雷千門萬戶次第開混然子曰時至氣化機動籟鳴信至時也信至之時即活子時也一聞此信即準備火功莫差時刻若當面錯過安能採玉芝於片餉採藥猛睹先天一粒丹其光灼灼似金丸巽風不把槖籥鼓縱欲過關卻也難金丹一粒圓陀陀光灼灼明亮似金丸若不吹巽風鼓槖籥安能過尾閭上夾脊雙關泥丸以入丹田乎入藥鏡曰起巽風運坤火肖紫虛曰乾坤槖籥鼓有數夫巽風喻呼吸之氣也槖籥者消息也有呼吸之氣方能鼓動以消息使藥升降往還以成一周天柳華陽曰金丹之道從陽生時凝神入氣穴鼓起槖籥之巽風息息向爐中吹噓猶鐵匠手中抽動一般風生則火焰火焰則精化精化氣生採此生氣升降往還謂之周天也升元日出扶桑大海東火輪飛渡莫松功鹿車搬上崑崙頂木汞自歸神室中扶桑紅日自西而東正藥如紅日燦燦自東而來西方斯時也忙駕火輪飛渡洪濤大海由尾閭上夾脊雙關純陽曰子後午前定息坐夾脊雙關崑崙過又曰憑君子後午前看一脈天津在脊端肖紫虛曰幾回笑指崑山路夾脊分明有路通但逆行道左非鹿車不能推挽鹿車真意也有這點真意方能逾越險阻過得雙關上得崑崙下得鵲橋使活汞入於金鼎神室而永為身寶合丹艮男初歸混沌窩夫妻從此結絲羅六門緊閉勤添火帳里春光要太和艮男喻藥從艮宮而來也混沌窩祖氣穴也艮男之藥自東北而入祖氣穴與真鉛配合猶夫婦結絲羅一般然初歸時不相凝結須緊閉六門調息綿綿神火薰蒸使合為一但合丹之火須文火溫溫非若採取之時武火烹煉故要太和翔洽方能著手成春火候火記雖垂六百篇未將真候寫鸞箋最明莫過沖虛語呼吸分明瞭卻仙紫賢曰聖人傳藥不傳火從來火候少人知金丹萬卷不筆於書而沖虛獨曰火候雖云不可傳隨機默運入玄玄達觀往者千千聖呼吸分明瞭卻仙可見火候之要當於真息中求之蓋息從心起心靜息調息息歸根金丹之母然火候不一古人以內外別之外火候有作有為築基之事也內火候則丹已得任其自然無為之事也總不離呼吸二字不調外火候之呼吸則不能運行此丹不調內火候之呼吸則不能溫養此丹故柳華陽曰凡呼吸之火能化飲食之穀精而助元精凡神火能化元精而助元氣凡元氣之火能化呼吸而助元神元神之火又能化形而還虛助道成始成終皆承火之力以登大羅之仙又須知火與候原不相離火必應候候至火亦至故火候二字有逐節事條不經師授終難了徹於心須修德明天以求師授溫養已看白雪種青砂寒燠調停切莫差三十六宮春意足自然有路泛仙槎白雪種砂金鉛得木汞配合必須寒燠調停溫養青砂溫者不使其熱之謂寒則水冷而丹不結熱則火燥而丹易爍故取其溫養者從容涵育任其自化如天澤物雨暘以時如母孕子寢興有節如龍養珠蟄伏不動如雞抱卵暖氣不絶子前進火午後退符余時調息綿綿似有似無屏除妄念如愚如訥古云採藥只一時合汞須十月又云十月胎完入聖基若非善為溫養安能胎圓乎三十六宮者周天三百六十也每一周天休息一番周天有程溫養有數必須養足方成聖胎其中節目度數未敢書於竹帛懼泄天機也噫仙槎非遙升天有路患人不修德盟天虛心誠求耳胎息功夫到此莫粗疏神息綿綿合太虛借問養胎何所似恍如父母未生初丹結之後神即氣而凝氣即神而往如人懷孕一般故謂之胎非真有胎也神息住於此也蓋胎者藏神之府息者化胎之源胎因息生息因胎住胎不得息不成息不得神無主神息相依是真胎息功夫到此切莫粗疏必要忘相忘形體同太虛而真息往來綿綿不絶似有似無若忘若存如春沼魚如百蟲蟄呼至於根吸至於蒂終日混混如在母腹未生之初一般不二元君曰息息返乾初者此也到息住脈停則神定矣神定方能出定而聖胎始完度數採藥燒丹有後先坎離艮巽倒還顛功完九九周天數那怕不成物外仙柔人行道與剛人不同而其成功比剛人容易剛人伏氣三年柔人一年可伏以丹在身中故也然氣雖易伏而赤脈最能害道果是女中丈夫能斬赤脈則經不漏而基已築矣築基之後則用煉精化氣之功以離外二陽消坎外二陰變成乾體然坎離功足乾體雖成而其氣未化其神未靈又當用煉氣化神之功以艮上一陽化巽下一陰熔盡外陰之氣以成純陽之神到運行周天數終九九神復純陽又當用煉神還虛之功方成物外神仙脫胎七十六宮度數周陽神忽到上田遊一聲霹靂天門吼頂上爭看白氣浮周天之功至七十六度聖胎已完陽神由中田遷上田破頂而出是謂脫胎鍾離云雷震天門鬼神驚掀翻宇宙飛白雲金丹傳真云頂門忽然雷響懷中抱著嬰兒夫神所以脫胎而出者神定故也沖虛曰神初不能定依二氣為定氣定則神隨之定氣定則無氣神離所依而獨立乃能離定捨身而出定若不到大定神正要依靠不能離氣焉能離身形故心息相依神定方能出定而其出定景象各有不同有以天花亂墜出者有以七層寶塔出者有以身外有身出者有以風雲雷震出者馬丹陽真人是也有以香風瑞氣出者如不二元君是也總之神之出也由定靜中一念故變化顯象亦由一念即千百億萬身亦由一念未可以所出不同遂疑其有異也曰白氣浮者特舉一端以為證耳乳哺初産嬰孩氣未純仍吞木汞復元真佇看乳養經三載變化通靈果是神古云嬰兒初産未成人須藉坤娘養育恩乳哺三載方能變化通靈故須仍吞木汞以復元真非真要三載也特三周天耳面壁丹事雖完猶有功冥心靜坐洞天中忘形入定九年滿打破虛空總算空面壁之功無為之事也不二元君曰萬事皆云畢凝然坐小龕輕身乘紫氣靜性濯清潭氣渾陰陽一神同天地三功完朝玉闕長嘯出煙嵐故乳哺功滿必須擇名山洞府冥心靜坐面壁調神出則以太虛為超脫之境入則以上田為棲棲之所忘形入定以煉真空煉到空無可空打破虛空神方還虛此達摩所為必面壁九年也沖舉煉到真空道愈高丹書下詔步雲霄從今永住瑤池苑隨著靈妃去早朝不二元君曰佳期方出谷咫尺上神霄又曰一旦仙凡隔冷熱度海潮神既還虛升遐有期天書下詔云鶴來迎赴瑤池以賜宴朝金母以受圖瓊樓玉闕為我室家湘妃瑤姬為我同儕何樂如之特患宇宙無決烈女子斯不能與麻姑為伍果是女中丈夫修德盟天虛心誠求得行此道比男子尤易成耳人其立志自勉可也
